<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="rock-paper-scissors.css">
</head>
<body>
    <div class="container">

        <h1>Rock Paper Scissors</h1>

        <div class="scoreboard">
            <span>You: <span id="playerScore">0</span></span>
            <span>AI: <span id="computerScore">0</span></span>
        </div>

        <div class="arena">
            <div class="player-section">
                <h3>You</h3>
                <div id="playerHand" class="hand">✊</div>
            </div>
            <div class="vs">
                <div id="countdown">Ready?</div>
            </div>
            <div class="computer-section">
                <h3>AI</h3>
                <div id="computerHand" class="hand">✊</div>
            </div>
        </div>

        <div class="buttons">
            <button onclick="playMove('rock')">Rock</button>
            <button onclick="playMove('paper')">Paper</button>
            <button onclick="playMove('scissors')">Scissors</button>
        </div>
        <div id="result" class="result"></div>
        <div id="taunt" class="taunt"></div>
    </div>

    <script src="rock-paper-scissors.js"></script>
</body>

</html>
